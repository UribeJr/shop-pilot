# Shop Pilot – Render Blueprint
# Deploy: Push to GitHub, then open the Dashboard deeplink below.

services:
  - type: web
    name: shop-pilot
    runtime: node
    plan: free

    buildCommand: npm ci && npm run build:render
    startCommand: npm run start --workspace @notion-store-analyst/web

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shop-pilot-db
          property: connectionString

      # Shopify – set in Dashboard after deploy
      - key: NEXT_PUBLIC_SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_APP_HANDLE
        value: shop-pilot
      - key: SHOPIFY_SCOPES
        value: read_orders,read_products,read_customers,read_inventory
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: SHOPIFY_SHOP_DOMAIN
        sync: false
      - key: SHOPIFY_ADMIN_ACCESS_TOKEN
        sync: false

      # Notion
      - key: NOTION_MCP_MODE
        value: real
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_PARENT_PAGE_ID
        sync: false

      # MCP embed chat
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: shop-pilot-db
    databaseName: shop_pilot
    plan: free
